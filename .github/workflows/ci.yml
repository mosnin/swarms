name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Migrations in sync (no drift)
        run: |
          npx drizzle-kit generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "::error::Drizzle schema and migrations are out of sync. Run 'npm run db:generate' and commit."
            git --no-pager diff -- drizzle
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Build SDK (standalone)
        run: cd packages/hermes-cloud-sdk && npx tsc -p tsconfig.json
